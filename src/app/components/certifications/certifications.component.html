<section class="certificates" id="certificates">
  <h2 class="section-subtitle">Certificates</h2>

  <div class="certificate-row" *ngFor="let certification of certifications">
    <div class="certificate-info" >
      <h3>{{certification.title}}</h3>
      <p><strong>Foundation:</strong> {{certification.company}}</p>
      <p><strong>Issued:</strong> {{certification.issued}}</p>
    </div>
    <a href="{{certification.link}}" class="view-btn" target="_blank">View</a>
  </div>
</section>
