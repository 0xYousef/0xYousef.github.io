<section class="contact-section">
  <h1 class="section-title">Contact me</h1>
  <p class="contact-subtitle">Cultivating Connections: Reach Out And Connect With Me</p>

  <form class="contact-form">
    <div class="form-row">
      <label>
        <input type="text" placeholder="Name" />
      </label>
      <label>
        <input type="email" placeholder="Email" />
      </label>
    </div>

    <div class="form-row">
      <label>
        <input type="text" placeholder="Phone Number" />
      </label>
      <label>
        <select>
          <option value="">Service Of Interest</option>
          <option value="web">Web Development</option>
          <option value="testing">Software Testing</option>
          <option value="ui/ux">UI/UX Design</option>
        </select>
      </label>
    </div>

    <div class="form-row">
      <label>
        <input type="text" placeholder="Timeline" />
      </label>
      <label>
        <textarea placeholder="Project Details..."></textarea>
      </label>
    </div>

    <div class="form-action">
      <button type="submit">Send</button>
    </div>
  </form>
</section>
